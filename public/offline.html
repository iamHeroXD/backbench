<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline · Backbench</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 320px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4a7aa8;
      margin: 0 auto 24px;
      opacity: 0.6;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #f0f0f0;
    }
    p {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    button {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      color: #d0d0d0;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    button:hover { border-color: #4a7aa8; color: #4a7aa8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="dot"></div>
    <h1>you're offline</h1>
    <p>Backbench needs an internet connection. Connect and try again.</p>
    <button onclick="window.location.reload()">try again</button>
  </div>
</body>
</html>
